<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="description" content="Jonah and Noel's Asteroid Assault Game — GUI Polish v7.1">
<meta name="theme-color" content="#120b00">
<title>Jonah and Noel's Asteroid Assault Game — Systems Polish v7.2</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090600;color:#fff;font-family:Arial,Helvetica,sans-serif;touch-action:none}
canvas{display:block;width:100vw;height:100vh}
#hint{position:fixed;left:16px;bottom:12px;padding:8px 11px;border:1px solid rgba(255,204,62,.35);border-radius:10px;background:rgba(10,7,0,.58);font-size:12px;color:#ffe8a3;backdrop-filter:blur(8px);pointer-events:none}
#transformBtn{position:fixed;right:18px;bottom:18px;width:74px;height:74px;border-radius:50%;border:2px solid rgba(255,211,71,.85);background:rgba(12,8,0,.68);color:#ffe071;font-weight:900;font-size:12px;box-shadow:0 0 24px rgba(255,190,35,.35);touch-action:manipulation}
#transformBtn:active{transform:scale(.95)}
@media (min-width:900px){#transformBtn{opacity:.78}}

#orientationGate{
  position:fixed;
  inset:0;
  z-index:99999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:28px;
  background:
    radial-gradient(circle at 50% 35%,rgba(255,208,63,.22),transparent 28%),
    rgba(5,3,0,.96);
  color:#fff;
  text-align:center;
  font-family:Arial,Helvetica,sans-serif;
}
#orientationGate .panel{
  width:min(420px,92vw);
  padding:30px 24px;
  border:2px solid rgba(255,207,62,.75);
  border-radius:24px;
  background:rgba(18,11,0,.86);
  box-shadow:0 0 45px rgba(255,183,34,.22);
}
#orientationGate .phone{
  display:inline-block;
  font-size:74px;
  line-height:1;
  animation:rotatePhone 1.7s ease-in-out infinite;
  transform-origin:center;
}
#orientationGate h2{
  margin:18px 0 8px;
  color:#ffd45b;
  font-size:25px;
}
#orientationGate p{
  margin:0;
  color:rgba(255,255,255,.78);
  line-height:1.5;
}
@keyframes rotatePhone{
  0%,20%{transform:rotate(0deg)}
  55%,85%{transform:rotate(90deg)}
  100%{transform:rotate(0deg)}
}
@media (orientation:portrait) and (max-width:900px){
  #orientationGate{display:flex}
  canvas,#hint,#transformBtn{visibility:hidden}
}
@media (orientation:landscape){
  #orientationGate{display:none!important}
}


@media (orientation:landscape) and (max-height:520px){
  #hint{
    left:12px;
    bottom:10px;
    max-width:300px;
    padding:6px 9px;
    font-size:10px;
    border-radius:8px;
    opacity:.82;
  }
  #transformBtn{
    right:12px;
    bottom:12px;
    width:58px;
    height:58px;
    font-size:10px;
    border-width:1.5px;
  }
}

</style>
</head>
<body>

<div id="orientationGate" role="dialog" aria-modal="true" aria-label="Rotate device">
  <div class="panel">
    <div class="phone">📱</div>
    <h2>Rotate to Landscape</h2>
    <p>Jonah and Noel's Asteroid Assault is designed for widescreen play. Turn your iPhone sideways to continue.</p>
  </div>
</div>

<canvas id="game"></canvas>
<div id="hint">Move: ↑ ↓ / W S / drag · Transform: Space / button</div>
<button id="transformBtn" aria-label="Transform">MODE<br>SPACE</button>
<script>
(() => {
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),transformBtn=document.getElementById('transformBtn');
let W=0,H=0,DPR=1,last=performance.now(),elapsed=0,state='playing',score=0,level=1,orientationPaused=false,milestoneBanner=0,milestoneType=0,milestoneAwaitingAck=false,modeCardTimer=3;
let playerLevel=1;
const playerLevelThresholds=[0,750,2500];
const playerLevelColors={
  1:{main:'#67e8ff',soft:'rgba(103,232,255,.55)',name:'AZURE'},
  2:{main:'#ffd95a',soft:'rgba(255,217,90,.55)',name:'GOLD'},
  3:{main:'#ff5fe1',soft:'rgba(255,95,225,.55)',name:'MAGENTA'},
  4:{main:'#4dffb8',soft:'rgba(77,255,184,.55)',name:'REGEN'},
  5:{main:'#b98cff',soft:'rgba(185,140,255,.58)',name:'GUARDIAN'}
};
const keys={},bullets=[],enemyShots=[],particles=[],debris=[],powerups=[],missiles=[],blasts=[],bossMissiles=[],bossLasers=[],stars=[];
const IMG={},sources={"nebula": "assets/nebula.png", "asteroid": "assets/asteroid.png", "missile": "assets/missile.png", "shield": "assets/shield.png", "robot": "assets/robot.png", "spaceship": "assets/spaceship.png", "hybrid": "assets/hybrid.png", "boss": "assets/boss.png", "iconSpeed": "assets/hud-icons/speed.svg", "iconRapid": "assets/hud-icons/rapid-fire.svg", "iconShield": "assets/hud-icons/shield.svg", "iconRegen": "assets/hud-icons/regen.svg", "iconBlast": "assets/hud-icons/blast.svg", "iconBurst": "assets/hud-icons/burst.svg", "iconBalanced": "assets/hud-icons/balanced.svg", "iconResistance": "assets/hud-icons/resistance.svg"};
let loaded=0;

for(const [k,v] of Object.entries(sources)){const im=new Image();im.src=v;im.onload=()=>loaded++;IMG[k]=im;}

function isCompactLandscape(){
  return window.matchMedia('(orientation: landscape)').matches &&
         window.innerHeight <= 520;
}
function isMobilePortrait(){
  return window.matchMedia('(orientation: portrait)').matches &&
         Math.min(window.innerWidth,window.innerHeight) < 900;
}
function updateOrientationState(){
  const wasPaused=orientationPaused;
  orientationPaused=isMobilePortrait();
  if(wasPaused && !orientationPaused){
    last=performance.now();
    resize();
  }
}
window.addEventListener('orientationchange',()=>{
  setTimeout(updateOrientationState,180);
  setTimeout(resize,260);
});
window.addEventListener('resize',updateOrientationState);
updateOrientationState();


const modes=['robot','spaceship','hybrid'];
const modeNames={robot:'ROBOT',spaceship:'SPACESHIP',hybrid:'HYBRID'};
const ship={
 x:130,y:300,speed:350,shield:3,maxShield:3,hitFlash:0,missileMode:0,
 fireTimer:0,missileTimer:0,mode:'hybrid',transforming:0,nextMode:null,
 blastTimer:5,invulnerable:0,shieldFlare:0,shieldAngle:0,shieldPulse:0,regenDelay:0,regenGlow:0,defenseCooldown:10,defenseBeam:0,defenseTarget:null,robotBurstRemaining:0,robotBurstTimer:0,robotBurstCooldown:0,shieldRatio:1,nextMissilePower:20
};
const asteroid={x:0,y:0,r:105,hp:20,maxHp:20,shootTimer:1.6,phase:0,dead:false,respawn:0};
const boss={
  active:false,defeated:false,x:0,y:0,r:175,hp:125,maxHp:125,
  phase:1,entry:0,turretTimer:1.1,missileTimer:8,laserTimer:14,
  laserCharge:0,laserY:0,shake:0,deathTimer:0,deathStage:0,deathPulse:0,coreFlash:0
};

function resize(){
 DPR=Math.max(1,Math.min(2,devicePixelRatio||1));W=innerWidth;H=innerHeight;
 canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
 ship.x=Math.max(120,W*.14);ship.y=Math.min(H-90,Math.max(95,ship.y||H/2));
 asteroid.x=W-Math.max(145,W*.14);asteroid.y=H/2;
 stars.length=0;for(let i=0;i<Math.max(70,W*H/13000);i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:.3+Math.random()*1.5,s:8+Math.random()*24,a:.2+Math.random()*.75});
}
addEventListener('resize',resize);resize();
addEventListener('keydown',e=>{
 keys[e.key.toLowerCase()]=true;
 if(['arrowup','arrowdown',' '].includes(e.key.toLowerCase()))e.preventDefault();
 if(milestoneAwaitingAck&&(e.key==='Enter'||e.key===' ')){acknowledgeMilestone();return;}
 if(e.code==='Space'&&!e.repeat&&state==='playing')startTransform();
 else if(state!=='playing'&&(e.key==='Enter'||e.key===' '))restart();
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
transformBtn.addEventListener('pointerdown',e=>{e.preventDefault();if(state==='playing')startTransform();else restart();});
let drag=false;
canvas.addEventListener('pointerdown',e=>{
 if(milestoneAwaitingAck){acknowledgeMilestone();return;}
 drag=true;if(state!=='playing')restart();ship.y=Math.max(75,Math.min(H-75,e.clientY));
});
canvas.addEventListener('pointermove',e=>{if(drag)ship.y=Math.max(75,Math.min(H-75,e.clientY));});
addEventListener('pointerup',()=>drag=false);

function syncSharedShield(){
 ship.shieldRatio=Math.max(0,Math.min(1,ship.shield/ship.maxShield));
}
function applySharedShieldToMode(mode){
 ship.maxShield=mode==='robot'?5:3;
 ship.shield=ship.shieldRatio*ship.maxShield;
}
function addSharedShieldRatio(amount){
 ship.shieldRatio=Math.max(0,Math.min(1,ship.shieldRatio+amount));
 ship.shield=ship.shieldRatio*ship.maxShield;
}

function startTransform(){
 if(ship.transforming>0)return;
 const i=modes.indexOf(ship.mode);
 ship.nextMode=modes[(i+1)%modes.length];
 ship.transforming=.5;
 ship.invulnerable=.5;
 burst(ship.x,ship.y,34,260,'#ffe06b');
}
function finishTransform(){
 syncSharedShield();
 ship.mode=ship.nextMode;ship.nextMode=null;
 applySharedShieldToMode(ship.mode);
 modeCardTimer=3;
 ship.fireTimer=0;
 ship.robotBurstRemaining=0;ship.robotBurstTimer=0;ship.robotBurstCooldown=0;
 ship.blastTimer=5;
 transformBtn.innerHTML=`MODE<br>${modeNames[ship.mode]}`;
 burst(ship.x,ship.y,42,320,'#71e9ff');
}
function playerDamageMultiplier(){
 return playerLevel===1?1:
        playerLevel===2?1.5:
        playerLevel===3?2.25:
        playerLevel===4?2.75:3.25;
}
function updatePlayerLevel(){
 let next=score>=playerLevelThresholds[2]?3:score>=playerLevelThresholds[1]?2:1;
 if(level>=15)next=Math.max(next,4);
 if(level>=20)next=5;
 if(next!==playerLevel){
   playerLevel=next;
   burst(ship.x,ship.y,70,380,playerLevelColors[playerLevel].main);
   ship.invulnerable=Math.max(ship.invulnerable,1);
   if(playerLevel>=4){ship.regenDelay=0;ship.regenGlow=1;}
   if(playerLevel>=5){ship.defenseCooldown=2;}
 }
}
function restart(){
 elapsed=0;score=0;level=1;playerLevel=1;milestoneBanner=0;milestoneType=0;milestoneAwaitingAck=false;modeCardTimer=3;state='playing';ship.shield=3;ship.maxShield=3;ship.shieldRatio=1;ship.nextMissilePower=20;ship.hitFlash=0;ship.missileMode=0;
 ship.mode='hybrid';ship.transforming=0;ship.nextMode=null;ship.blastTimer=5;ship.shieldFlare=0;ship.shieldPulse=0;ship.regenDelay=0;ship.regenGlow=0;ship.defenseCooldown=10;ship.defenseBeam=0;ship.defenseTarget=null;ship.robotBurstRemaining=0;ship.robotBurstTimer=0;ship.robotBurstCooldown=0;transformBtn.innerHTML='MODE<br>HYBRID';
 bullets.length=enemyShots.length=particles.length=debris.length=powerups.length=missiles.length=blasts.length=bossMissiles.length=bossLasers.length=0;
 boss.active=false;boss.defeated=false;boss.hp=boss.maxHp;boss.entry=0;boss.deathTimer=0;boss.deathStage=0;boss.deathPulse=0;boss.coreFlash=0;
 resetAsteroid();
}
function acknowledgeMilestone(){
 if(!milestoneAwaitingAck)return;
 milestoneAwaitingAck=false;
 milestoneBanner=0;
 last=performance.now();
}
function triggerMilestone(type){
 milestoneType=type;
 milestoneBanner=1;
 milestoneAwaitingAck=true;
 ship.invulnerable=Math.max(ship.invulnerable,1.2);
 burst(ship.x,ship.y,type===15?90:110,430,type===15?'#5fe8ff':'#b98cff');
}

function resetAsteroid(){
 if(level===15&&playerLevel<4)triggerMilestone(15);
 if(level===20&&playerLevel<5)triggerMilestone(20);
 updatePlayerLevel();
 if(level===5){startBoss();return;}
 boss.active=false;
 asteroid.maxHp=level<15 ? 20+(level-1)*6 : level<20 ? 104+(level-15)*5 : 129+(level-20)*4;
 asteroid.hp=asteroid.maxHp;asteroid.r=Math.max(75,105-(level-1)*2);
 asteroid.dead=false;asteroid.shootTimer=Math.max(.75,1.8-level*.08);
}
function burst(x,y,n,s,c){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=Math.random()*s;particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:.35+Math.random()*.75,max:1,size:1+Math.random()*4,c})}}
function getShipDimensions(){
 const compact=isCompactLandscape();
 return {
   robot:[Math.min(compact?108:143,W*(compact?.10:.1275)),Math.min(compact?108:143,H*(compact?.23:.2175))],
   spaceship:[Math.min(compact?175:233,W*(compact?.16:.2025)),Math.min(compact?53:70,H*(compact?.12:.1125))],
   hybrid:[Math.min(compact?149:199,W*(compact?.14:.1725)),Math.min(compact?79:105,H*(compact?.18:.165))]
 };
}
function getMuzzlePosition(){
 const [w,h]=getShipDimensions()[ship.mode];
 if(ship.mode==='robot')return {x:ship.x+w*.52,y:ship.y-h*.11};
 if(ship.mode==='spaceship')return {x:ship.x+w*.48,y:ship.y-h*.02};
 return {x:ship.x+w*.47,y:ship.y-h*.04};
}
function fire(){
 const muzzle=getMuzzlePosition();
 bullets.push({x:muzzle.x,y:muzzle.y,vx:760,r:ship.mode==='robot'?6:4,damage:playerDamageMultiplier(),heavy:ship.mode==='robot'});
 burst(muzzle.x,muzzle.y,ship.mode==='robot'?11:4,ship.mode==='robot'?185:105,playerLevelColors[playerLevel].main);
}
function fireMissile(){missiles.push({x:ship.x+52,y:ship.y+(Math.random()>.5?-15:15),vx:430,vy:(Math.random()-.5)*80,life:4,damage:3*playerDamageMultiplier()});}
function fireBlast(){
 blasts.push({x:ship.x+66,y:ship.y,vx:520,r:22,life:2.5,damage:6*playerDamageMultiplier()});
 burst(ship.x+80,ship.y,24,250,'#fff4a8');
}

function startBoss(){
  boss.active=true;boss.defeated=false;boss.hp=boss.maxHp;boss.phase=1;boss.deathStage=0;boss.deathPulse=0;boss.coreFlash=0;
  boss.x=W+boss.r;boss.y=H/2;boss.entry=2.4;
  boss.turretTimer=1.2;boss.missileTimer=8;boss.laserTimer=13;boss.laserCharge=0;
  asteroid.dead=true;enemyShots.length=0;
}
function bossHit(d,x,y){
  if(!boss.active||boss.defeated)return;
  const weak=Math.hypot(x-(boss.x-boss.r*.18),y-(boss.y-boss.r*.18))<boss.r*.34;
  const dealt=weak?d*2:d;
  boss.hp-=dealt;score+=dealt*12;updatePlayerLevel();
  burst(x,y,12,280,weak?'#9ef8ff':'#ff9b4a');
  const ratio=boss.hp/boss.maxHp;
  boss.phase=ratio>.7?1:ratio>.4?2:ratio>.15?3:4;
  boss.shake=Math.max(boss.shake,.12);
  if(boss.hp<=0){
    boss.hp=0;
    boss.defeated=true;
    boss.deathTimer=6.2;
    boss.deathStage=1;
    boss.deathPulse=0;
    boss.coreFlash=0;
    score+=5000;updatePlayerLevel();
    enemyShots.length=0;
    bossMissiles.length=0;
    bossLasers.length=0;
    boss.shake=.5;
    burst(boss.x,boss.y,50,260,'#ffd36a');
  }
}
function bossTurretFire(){
  const shots=boss.phase>=3?2:1;
  for(let j=0;j<shots;j++){
    const oy=(Math.random()-.5)*boss.r*1.25;
    const ox=-boss.r*.72;
    const a=Math.atan2(ship.y-(boss.y+oy),ship.x-(boss.x+ox));
    const sp=270+boss.phase*28;
    enemyShots.push({x:boss.x+ox,y:boss.y+oy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:7+boss.phase,rot:0,boss:true});
  }
}
function bossMissileBarrage(){
  const count=boss.phase>=3?4:3;
  for(let i=0;i<count;i++){
    const lane=i-(count-1)/2;
    bossMissiles.push({
      x:boss.x-boss.r*.66,
      y:boss.y+lane*36,
      vx:-120-Math.random()*30,
      vy:lane*18+(Math.random()-.5)*30,
      r:10,
      life:9,
      angle:Math.PI,
      turnRate:2.4+Math.random()*.8,
      wobble:Math.random()*Math.PI*2,
      trail:[],
      armed:false,
      age:0
    });
  }
}
function chargeSuperlaser(){
  boss.laserCharge=2.0;
  boss.laserY=Math.max(90,Math.min(H-90,ship.y+(Math.random()-.5)*100));
}
function fireSuperlaser(){
  bossLasers.push({y:boss.laserY,life:1.15,max:1.15,h:boss.phase>=4?58:44});
  boss.shake=.35;
}

function enemyFire(){const a=Math.atan2(ship.y-asteroid.y,ship.x-asteroid.x),sp=220+level*14;enemyShots.push({x:asteroid.x-asteroid.r*.65,y:asteroid.y+(Math.random()-.5)*asteroid.r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:10+Math.random()*5,rot:0});}
function spawnPower(type){powerups.push({type,x:W+45,y:90+Math.random()*(H-180),vx:-120-Math.random()*50,vy:(Math.random()-.5)*150,r:27,t:0});}
function asteroidHit(d,x,y){
 if(asteroid.dead)return;asteroid.hp-=d;score+=d*5;updatePlayerLevel();burst(x,y,13,270,'#ffd06b');
 if(asteroid.hp%5===0||asteroid.hp<=0)for(let i=0;i<(asteroid.hp<=0?7:2);i++)debris.push({x:asteroid.x+(Math.random()-.5)*asteroid.r,y:asteroid.y+(Math.random()-.5)*asteroid.r,vx:(Math.random()-.5)*280,vy:(Math.random()-.5)*280,r:7+Math.random()*18,life:2+Math.random()*1.5,rot:Math.random()*6,vr:(Math.random()-.5)*5});
 if(asteroid.hp<=0){asteroid.dead=true;asteroid.respawn=2.2;score+=100*level;updatePlayerLevel();burst(asteroid.x,asteroid.y,70,450,'#ff9b37');}
}
function shipHit(sourceX=ship.x+120,sourceY=ship.y,damage=1){
 if(ship.hitFlash>0||ship.invulnerable>0)return;
 const ratioDamage=damage/ship.maxShield;
 ship.shieldRatio=Math.max(0,ship.shieldRatio-ratioDamage);
 ship.shield=ship.shieldRatio*ship.maxShield;
 ship.regenDelay=3;
 ship.regenGlow=0;
 ship.hitFlash=1.1;
 ship.shieldFlare=.72;
 ship.shieldPulse=0;
 ship.shieldAngle=Math.atan2(sourceY-ship.y,sourceX-ship.x);
 const impactX=ship.x+Math.cos(ship.shieldAngle)*58;
 const impactY=ship.y+Math.sin(ship.shieldAngle)*42;
 burst(impactX,impactY,30,320,'#70eaff');
 if(ship.shield<=0){state='gameover';burst(ship.x,ship.y,75,460,'#ff554f')}
}
function currentShipAssetLength(){
 const compact=isCompactLandscape();
 if(ship.mode==='spaceship')return compact?175:233;
 if(ship.mode==='hybrid')return compact?149:199;
 return compact?108:143;
}
function findDefenseThreat(){
 const range=currentShipAssetLength();
 let best=null,bestDist=Infinity;
 for(const e of enemyShots){
   if(e.dead)continue;
   const d=Math.hypot(e.x-ship.x,e.y-ship.y);
   if(d<=range&&d<bestDist){best=e;bestDist=d;}
 }
 for(const m of bossMissiles){
   if(m.dead)continue;
   const d=Math.hypot(m.x-ship.x,m.y-ship.y);
   if(d<=range&&d<bestDist){best=m;bestDist=d;}
 }
 return best;
}
function fireDefenseLaser(target){
 if(!target)return;
 ship.defenseBeam=.22;
 ship.defenseTarget={x:target.x,y:target.y};
 target.dead=true;
 burst(target.x,target.y,28,340,'#c6a2ff');
 score+=25;updatePlayerLevel();
}
function hit(a,b,r){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy<(a.r+r)*(a.r+r)}
function trim(a){for(let i=a.length-1;i>=0;i--)if(a[i].dead||a[i].life<=0)a.splice(i,1)}

function update(dt){
 if(orientationPaused||milestoneAwaitingAck)return;
 for(const s of stars){s.x-=s.s*dt;if(s.x<0){s.x=W;s.y=Math.random()*H}}
 for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;p.life-=dt}trim(particles);
 for(const d of debris){d.x+=d.vx*dt;d.y+=d.vy*dt;d.rot+=d.vr*dt;d.life-=dt}trim(debris);
 if(state!=='playing')return;
 elapsed+=dt;
 ship.hitFlash=Math.max(0,ship.hitFlash-dt);
 ship.invulnerable=Math.max(0,ship.invulnerable-dt);
 ship.missileMode=Math.max(0,ship.missileMode-dt);
 ship.shieldFlare=Math.max(0,ship.shieldFlare-dt);
 ship.shieldPulse+=dt;
 ship.regenDelay=Math.max(0,ship.regenDelay-dt);
 ship.regenGlow=Math.max(0,ship.regenGlow-dt);
 ship.defenseBeam=Math.max(0,ship.defenseBeam-dt);
 modeCardTimer=Math.max(0,modeCardTimer-dt);
 const robotRegen=ship.mode==='robot';
 const progressionRegen=playerLevel>=4;
 if((robotRegen||progressionRegen)&&ship.regenDelay<=0&&ship.shield<ship.maxShield){
   let fullRegenSeconds=20;
   if(robotRegen){
     fullRegenSeconds=playerLevel>=5?8:playerLevel>=4?12:50;
   }
   ship.shieldRatio=Math.min(1,ship.shieldRatio+dt/fullRegenSeconds);
   ship.shield=ship.shieldRatio*ship.maxShield;
   ship.regenGlow=.25;
 }
 if(playerLevel>=5){
   ship.defenseCooldown-=dt;
   if(ship.defenseCooldown<=0){
     const threat=findDefenseThreat();
     if(threat){fireDefenseLaser(threat);ship.defenseCooldown=10;}
     else ship.defenseCooldown=0;
   }
 }

 if(ship.transforming>0){
   ship.transforming-=dt;
   if(ship.transforming<=0)finishTransform();
 } else {
   const mv=((keys.arrowdown||keys.s)?1:0)-((keys.arrowup||keys.w)?1:0);
   const modeSpeed=ship.mode==='robot'?ship.speed*.8:ship.speed;

 ctx.drawImage(IMG[mode],-w*.48,-h*.48,w,h);
 ctx.shadowBlur=0;
 if((ship.mode==='robot'||playerLevel>=4)&&ship.regenDelay<=0&&ship.shield<ship.maxShield){
   const regenPulse=.5+.5*Math.sin(ship.shieldPulse*(ship.mode==='robot'?8:6));
   ctx.save();
   ctx.globalCompositeOperation='screen';
   ctx.shadowBlur=ship.mode==='robot'?24:18;
   ctx.shadowColor='#55eaff';
   const rg=ctx.createRadialGradient(0,0,3,0,0,Math.max(w,h)*.48);
   rg.addColorStop(0,`rgba(180,250,255,${.22+.16*regenPulse})`);
   rg.addColorStop(.52,`rgba(46,202,255,${.10+.10*regenPulse})`);
   rg.addColorStop(1,'rgba(20,90,230,0)');
   ctx.fillStyle=rg;
   ctx.beginPath();ctx.ellipse(0,0,w*.42,Math.max(h*.40,28),0,0,Math.PI*2);ctx.fill();

   ctx.strokeStyle=`rgba(111,239,255,${.38+.38*regenPulse})`;
   ctx.lineWidth=ship.mode==='robot'?2.4:1.8;
   ctx.lineCap='round';
   const lines=ship.mode==='robot'
     ? [[-.24,-.21,.02,-.08],[-.18,.08,.08,.18],[.02,-.08,.25,-.19],[.05,.16,.28,.06]]
     : [[-.28,-.05,.02,-.03],[.02,-.03,.29,-.08],[-.12,.10,.18,.08]];
   for(const l of lines){
     ctx.beginPath();ctx.moveTo(l[0]*w,l[1]*h);ctx.lineTo(l[2]*w,l[3]*h);ctx.stroke();
   }
   for(const n of [[-.20,-.18],[.02,-.07],[.20,-.16],[-.10,.12],[.20,.06]]){
     ctx.fillStyle=`rgba(180,252,255,${.45+.45*regenPulse})`;
     ctx.beginPath();ctx.arc(n[0]*w,n[1]*h,ship.mode==='robot'?2.8:2.1,0,Math.PI*2);ctx.fill();
   }
   ctx.restore();
 }
 if(playerLevel>=5&&ship.defenseCooldown<=0){
   ctx.save();
   ctx.globalCompositeOperation='screen';
   const gp=.55+.45*Math.sin(ship.shieldPulse*5);
   ctx.shadowBlur=16;
   ctx.shadowColor='#a78cff';
   ctx.strokeStyle=`rgba(211,199,255,${.45+.35*gp})`;
   ctx.lineWidth=1.6;
   const bx=w*.34,by=Math.max(h*.30,24);
   const c=8;
   ctx.beginPath();
   ctx.moveTo(-bx,-by+c);ctx.lineTo(-bx,-by);ctx.lineTo(-bx+c,-by);
   ctx.moveTo(bx-c,-by);ctx.lineTo(bx,-by);ctx.lineTo(bx,-by+c);
   ctx.moveTo(-bx,by-c);ctx.lineTo(-bx,by);ctx.lineTo(-bx+c,by);
   ctx.moveTo(bx-c,by);ctx.lineTo(bx,by);ctx.lineTo(bx,by-c);
   ctx.stroke();
   ctx.fillStyle=`rgba(190,166,255,${.35+.35*gp})`;
   ctx.beginPath();ctx.arc(w*.24,-h*.18,2.2,0,Math.PI*2);ctx.fill();
   ctx.restore();
 }
 if(ship.defenseBeam>0&&ship.defenseTarget){
   ctx.save();const tx=ship.defenseTarget.x-ship.x,ty=ship.defenseTarget.y-ship.y;
   ctx.strokeStyle='#e8dcff';ctx.lineWidth=4;ctx.shadowBlur=22;ctx.shadowColor='#a978ff';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(tx,ty);ctx.stroke();
   ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(tx,ty);ctx.stroke();ctx.restore();
 }
 if(ship.shieldFlare>0){
   const life=ship.shieldFlare/.72;
   const rx=w*.53,ry=Math.max(h*.48,48);

   ctx.save();
   ctx.rotate(ship.shieldAngle);
   ctx.shadowBlur=30*life;
   ctx.shadowColor='#6cecff';
   const glow=ctx.createRadialGradient(rx*.58,0,1,rx*.58,0,ry);
   glow.addColorStop(0,`rgba(240,255,255,${.95*life})`);
   glow.addColorStop(.18,`rgba(91,232,255,${.76*life})`);
   glow.addColorStop(1,'rgba(24,102,255,0)');
   ctx.fillStyle=glow;
   ctx.beginPath();
   ctx.ellipse(rx*.5,0,ry*.65,ry*.95,0,-Math.PI*.62,Math.PI*.62);
   ctx.fill();
   ctx.restore();

   ctx.save();
   ctx.lineCap='round';
   for(let i=0;i<4;i++){
     const spread=.18+i*.105+(1-life)*.2;
     ctx.strokeStyle=`rgba(${105+i*35},${215+i*10},255,${(.82-i*.15)*life})`;
     ctx.lineWidth=3-i*.48;
     ctx.shadowBlur=18;
     ctx.shadowColor='#69eaff';
     ctx.beginPath();
     ctx.ellipse(0,0,rx*(1+i*.035),ry*(1+i*.04),0,ship.shieldAngle-spread,ship.shieldAngle+spread);
     ctx.stroke();
   }
   ctx.restore();

   ctx.save();
   ctx.globalAlpha=.14*life;
   ctx.strokeStyle='#c9fbff';
   ctx.lineWidth=1.2;
   ctx.beginPath();
   ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
   ctx.stroke();
   ctx.restore();
 }
 ctx.restore();
}

function drawBoss(){
 if(!boss.active)return;
 ctx.save();
 const sx=boss.shake>0?(Math.random()-.5)*boss.shake*35:0,sy=boss.shake>0?(Math.random()-.5)*boss.shake*35:0;
 ctx.translate(boss.x+sx,boss.y+sy);
 const s=boss.r*(isCompactLandscape()?1.65:2.2);
 ctx.globalAlpha=boss.defeated?Math.max(0,.9-(6.2-boss.deathTimer)*.08):1;
 ctx.drawImage(IMG.boss,-s/2,-s/2,s,s);

 if(boss.defeated){
   const t=6.2-boss.deathTimer;

   ctx.save();
   ctx.globalCompositeOperation='screen';
   const coreR=28+t*18;
   const core=ctx.createRadialGradient(0,0,2,0,0,coreR);
   core.addColorStop(0,`rgba(255,255,255,${Math.min(1,.45+t*.16)})`);
   core.addColorStop(.25,'rgba(255,230,140,.95)');
   core.addColorStop(.6,'rgba(255,90,30,.45)');
   core.addColorStop(1,'rgba(255,50,10,0)');
   ctx.fillStyle=core;
   ctx.beginPath();ctx.arc(0,0,coreR,0,Math.PI*2);ctx.fill();

   if(boss.deathStage>=2){
     ctx.strokeStyle=`rgba(255,176,70,${Math.max(0,.85-(t-1.6)*.18)})`;
     ctx.lineWidth=3;
     for(let i=0;i<12;i++){
       const a=i/12*Math.PI*2+Math.sin(i*2.1)*.12;
       ctx.beginPath();
       ctx.moveTo(Math.cos(a)*18,Math.sin(a)*18);
       ctx.lineTo(Math.cos(a+.12)*boss.r*(.45+.35*Math.random()),Math.sin(a+.12)*boss.r*(.45+.35*Math.random()));
       ctx.stroke();
     }
   }
   ctx.restore();
 }

 if(boss.laserCharge>0){
   const p=1-boss.laserCharge/2;
   ctx.strokeStyle=`rgba(255,40,30,${.25+.65*p})`;ctx.lineWidth=3+8*p;
   ctx.beginPath();ctx.moveTo(-boss.r*.1,-boss.r*.18);ctx.lineTo(-W,boss.laserY-boss.y);ctx.stroke();
   ctx.fillStyle='#fff';ctx.shadowBlur=30;ctx.shadowColor='#ff2d20';ctx.beginPath();ctx.arc(-boss.r*.1,-boss.r*.18,8+13*p,0,7);ctx.fill();
 }
 ctx.restore();
 if(boss.laserCharge>0){
   ctx.save();ctx.textAlign='center';ctx.font='900 18px Arial';ctx.fillStyle='#ff4e3a';ctx.shadowBlur=12;ctx.shadowColor='#ff1d12';
   ctx.fillText(`SUPERLASER CHARGING ${boss.laserCharge.toFixed(1)}s`,W/2,105);ctx.restore();
 }

 if(boss.defeated){
   const t=6.2-boss.deathTimer;
   if(t>3.45){
     const p=Math.min(1,(t-3.45)/1.5);
     ctx.save();
     ctx.globalCompositeOperation='screen';
     ctx.strokeStyle=`rgba(255,240,190,${1-p})`;
     ctx.lineWidth=10*(1-p)+2;
     ctx.shadowBlur=35;
     ctx.shadowColor='#fff2ba';
     ctx.beginPath();
     ctx.arc(boss.x,boss.y,40+p*Math.max(W,H)*.72,0,Math.PI*2);
     ctx.stroke();

     const flash=Math.max(0,1-p*1.25);
     if(flash>0){
       ctx.fillStyle=`rgba(255,245,210,${flash*.82})`;
       ctx.fillRect(0,0,W,H);
     }
     ctx.restore();
   }
 }
}

function drawAsteroid(){
 if(asteroid.dead)return;ctx.save();ctx.translate(asteroid.x,asteroid.y);ctx.rotate(asteroid.phase*.05);const ratio=Math.max(.68,asteroid.hp/asteroid.maxHp),s=asteroid.r*(isCompactLandscape()?1.75:2.35)*ratio;ctx.drawImage(IMG.asteroid,-s/2,-s/2,s,s);
 const cracks=Math.floor((1-asteroid.hp/asteroid.maxHp)*7);ctx.strokeStyle='#ff8c35';ctx.lineWidth=2;for(let i=0;i<cracks;i++){const a=i*1.4;ctx.beginPath();ctx.moveTo(Math.cos(a)*20,Math.sin(a)*20);ctx.lineTo(Math.cos(a+.2)*asteroid.r*.7,Math.sin(a+.2)*asteroid.r*.7);ctx.stroke()}ctx.restore();
}
function drawObjects(){
 for(const b of bullets){const g=ctx.createLinearGradient(b.x-24,b.y,b.x+8,b.y);g.addColorStop(0,'rgba(255,217,72,0)');g.addColorStop(1,playerLevelColors[playerLevel].main);ctx.strokeStyle=g;ctx.lineWidth=b.heavy?8:5;ctx.shadowBlur=b.heavy?14:0;ctx.shadowColor=playerLevelColors[playerLevel].main;ctx.beginPath();ctx.moveTo(b.x-(b.heavy?30:22),b.y);ctx.lineTo(b.x+(b.heavy?8:5),b.y);ctx.stroke();ctx.shadowBlur=0}
 for(const q of blasts){ctx.save();ctx.shadowBlur=28;ctx.shadowColor=playerLevelColors[playerLevel].main;const g=ctx.createRadialGradient(q.x,q.y,2,q.x,q.y,q.r);g.addColorStop(0,'#ffffff');g.addColorStop(.4,playerLevelColors[playerLevel].main);g.addColorStop(1,'rgba(255,174,40,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,7);ctx.fill();ctx.restore()}

 for(const bm of bossMissiles){
   ctx.save();
   for(let i=0;i<bm.trail.length;i++){
     const t=bm.trail[i];
     if(t.life<=0)continue;
     const a=Math.max(0,t.life/.5);
     ctx.globalAlpha=a*.65;
     ctx.fillStyle=i%2?'#ff8b36':'#ffd47a';
     ctx.beginPath();
     ctx.arc(t.x,t.y,2+4*a,0,Math.PI*2);
     ctx.fill();
   }
   ctx.globalAlpha=1;
   ctx.translate(bm.x,bm.y);
   ctx.rotate(bm.angle);

   ctx.shadowBlur=16;
   ctx.shadowColor='#ff4b1f';
   ctx.fillStyle='#ff6b2d';
   ctx.beginPath();
   ctx.moveTo(-18,0);
   ctx.lineTo(-27,-4);
   ctx.lineTo(-24,0);
   ctx.lineTo(-27,4);
   ctx.closePath();
   ctx.fill();

   ctx.shadowBlur=0;
   const body=ctx.createLinearGradient(-15,-6,15,6);
   body.addColorStop(0,'#3c4653');
   body.addColorStop(.45,'#cfd6dd');
   body.addColorStop(.75,'#6f7985');
   body.addColorStop(1,'#1b222b');
   ctx.fillStyle=body;
   ctx.beginPath();
   ctx.moveTo(17,0);
   ctx.lineTo(10,-5);
   ctx.lineTo(-13,-5);
   ctx.lineTo(-18,-2);
   ctx.lineTo(-18,2);
   ctx.lineTo(-13,5);
   ctx.lineTo(10,5);
   ctx.closePath();
   ctx.fill();

   ctx.fillStyle='#d9dde2';
   ctx.beginPath();
   ctx.moveTo(-5,-5);ctx.lineTo(-12,-11);ctx.lineTo(2,-5);ctx.closePath();ctx.fill();
   ctx.beginPath();
   ctx.moveTo(-5,5);ctx.lineTo(-12,11);ctx.lineTo(2,5);ctx.closePath();ctx.fill();

   ctx.fillStyle='#df2f26';
   ctx.fillRect(-8,-2,7,4);
   ctx.strokeStyle='rgba(255,255,255,.55)';
   ctx.lineWidth=1;
   ctx.beginPath();
   ctx.moveTo(13,0);ctx.lineTo(-13,0);ctx.stroke();
   ctx.restore();
 }
 for(const bl of bossLasers){
   const a=Math.max(0,bl.life/bl.max);ctx.save();ctx.globalAlpha=Math.min(1,a*2);
   const g=ctx.createLinearGradient(0,bl.y,W,bl.y);g.addColorStop(0,'rgba(255,35,20,.2)');g.addColorStop(.7,'#ff3a24');g.addColorStop(1,'#fff');
   ctx.fillStyle=g;ctx.shadowBlur=24;ctx.shadowColor='#ff2a18';ctx.fillRect(0,bl.y-bl.h/2,W,bl.h);ctx.restore();
 }

 for(const e of enemyShots){ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot);ctx.fillStyle='#6b492a';ctx.beginPath();for(let i=0;i<9;i++){const a=i/9*Math.PI*2,r=e.r*(.8+Math.sin(i*3)*.18);i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.strokeStyle='#bd7d38';ctx.stroke();ctx.restore()}
 for(const m of missiles){ctx.save();ctx.translate(m.x,m.y);ctx.rotate(Math.atan2(m.vy,m.vx));ctx.fillStyle='#fff2b0';ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-8,-5);ctx.lineTo(-4,0);ctx.lineTo(-8,5);ctx.closePath();ctx.fill();ctx.restore()}

 for(const p of powerups){ctx.save();ctx.translate(p.x,p.y);const pulse=1+Math.sin(p.t*5)*.07,s=p.r*2.7*pulse;ctx.shadowBlur=22;ctx.shadowColor=p.type==='shield'?'#36cfff':'#ffc62a';ctx.drawImage(IMG[p.type],-s/2,-s/2,s,s);ctx.restore()}
 for(const d of debris){ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot);ctx.fillStyle='#423226';ctx.beginPath();for(let i=0;i<8;i++){const a=i/8*Math.PI*2,r=d.r*(.75+Math.random()*.2);i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.restore()}
 for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill()}ctx.globalAlpha=1;
}
function drawTransformOverlay(){
 if(ship.transforming<=0)return;
 const p=1-ship.transforming/.5;
 ctx.save();ctx.textAlign='center';ctx.font='900 18px Arial';ctx.fillStyle='#fff0a1';ctx.shadowBlur=16;ctx.shadowColor='#ffc928';
 ctx.fillText(`TRANSFORMING → ${modeNames[ship.nextMode]}`,W/2,H*.2);
 ctx.strokeStyle='rgba(255,221,91,.35)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(ship.x,ship.y,55+p*55,0,Math.PI*2);ctx.stroke();ctx.restore();
}
function drawMilestoneBanner(){
 if(milestoneBanner<=0)return;
 const alpha=1;

 ctx.save();
 ctx.globalAlpha=alpha;
 ctx.fillStyle='rgba(4,6,14,.82)';
 ctx.fillRect(0,0,W,H);

 const color=milestoneType===15?'#65e9ff':'#bc92ff';
 const panelW=Math.min(620,W*.78);
 const panelH=isCompactLandscape()?210:270;
 const px=W/2-panelW/2,py=H/2-panelH/2;

 rr(px,py,panelW,panelH,22);
 ctx.fillStyle='rgba(8,11,24,.94)';
 ctx.fill();
 ctx.strokeStyle=color;
 ctx.lineWidth=2.5;
 ctx.shadowBlur=28;
 ctx.shadowColor=color;
 ctx.stroke();
 ctx.shadowBlur=0;

 ctx.textAlign='center';
 ctx.fillStyle=color;
 ctx.font=`900 ${isCompactLandscape()?16:20}px Arial`;
 ctx.fillText(milestoneType===15?'NEW TECHNOLOGY UNLOCKED':'FINAL EVOLUTION UNLOCKED',W/2,py+38);

 ctx.fillStyle='#fff';
 ctx.font=`900 ${isCompactLandscape()?26:38}px Arial`;
 ctx.fillText(milestoneType===15?'SHIELD MATRIX Mk II':'GUARDIAN AI ONLINE',W/2,py+(isCompactLandscape()?78:95));

 ctx.font=`700 ${isCompactLandscape()?13:17}px Arial`;
 ctx.fillStyle='rgba(255,255,255,.88)';
 if(milestoneType===15){
   ctx.fillText('All transformation modes now regenerate shields.',W/2,py+(isCompactLandscape()?112:140));
   ctx.fillText('Robot Tank regeneration is significantly faster.',W/2,py+(isCompactLandscape()?136:170));
   ctx.fillStyle='#6beaff';
   ctx.fillText('Asteroid Level 15 reached',W/2,py+(isCompactLandscape()?172:216));
 }else{
   ctx.fillText('Autonomous defence laser activated.',W/2,py+(isCompactLandscape()?112:140));
   ctx.fillText('Intercepts nearby projectiles every 10 seconds.',W/2,py+(isCompactLandscape()?136:170));
   ctx.fillStyle='#c6a2ff';
   ctx.fillText('Asteroid Level 20 reached',W/2,py+(isCompactLandscape()?172:216));
 }
 ctx.font=`800 ${isCompactLandscape()?11:14}px Arial`;
 ctx.fillStyle='rgba(255,255,255,.72)';
 ctx.fillText('TAP OR PRESS ENTER TO CONTINUE',W/2,py+panelH-18);

 ctx.restore();
}

function gameOver(){ctx.fillStyle='rgba(5,3,0,.72)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='900 54px Arial';ctx.fillText('MISSION FAILED',W/2,H/2-20);ctx.font='700 18px Arial';ctx.fillStyle='#ffd04a';ctx.fillText(`Score ${score} · Player Level ${playerLevel} · Tap or press Enter to restart`,W/2,H/2+24);ctx.textAlign='left'}
function loop(now){const dt=orientationPaused?0:Math.min(.033,(now-last)/1000);last=now;update(dt);drawBg();drawHud();drawObjects();drawAsteroid();drawBoss();drawShip();drawTransformOverlay();drawMilestoneBanner();if(state==='gameover')gameOver();requestAnimationFrame(loop)}
transformBtn.innerHTML='MODE<br>HYBRID';
if(screen.orientation && screen.orientation.lock){
  document.addEventListener('fullscreenchange',()=>{
    if(document.fullscreenElement)screen.orientation.lock('landscape').catch(()=>{});
  });
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
